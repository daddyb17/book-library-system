services:
  postgres:
    image: postgres:17-alpine
    container_name: booklibrarysystem-postgres
    environment:
      POSTGRES_DB: booklibrarysystem
      POSTGRES_USER: booklibrarysystem
      POSTGRES_PASSWORD: booklibrarysystem
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booklibrarysystem -d booklibrarysystem"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
    container_name: booklibrarysystem-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/booklibrarysystem
      DB_USERNAME: booklibrarysystem
      DB_PASSWORD: booklibrarysystem
    ports:
      - "8080:8080"
