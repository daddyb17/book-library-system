name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run tests and build the application
        run: ./gradlew clean build --no-daemon

      - name: Build Docker image
        run: docker build -t booklibrarysystem:ci .

      - name: Start container for smoke test
        run: docker run -d --name booklibrarysystem-smoke -e SPRING_PROFILES_ACTIVE=local -p 8080:8080 booklibrarysystem:ci

      - name: Verify health endpoint
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/actuator/health; then
              exit 0
            fi
            sleep 5
          done
          docker logs booklibrarysystem-smoke
          exit 1

      - name: Stop smoke test container
        if: always()
        run: docker rm -f booklibrarysystem-smoke
